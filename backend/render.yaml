services:
  - type: web
    name: track-holdings-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: >-
      gunicorn app.main:app
      -k uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:$PORT
      --workers 1
      --timeout 120
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: track-holdings-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: AI_PROVIDER_TYPE
        value: mock
      - key: CORS_ORIGINS
        value: https://track-holdings.vercel.app
      - key: PYTHON_VERSION
        value: "3.12"
      - key: USE_MOCK_DATA
        value: "0"
      # FMP_API_KEY — set manually in Render dashboard (secret)
      - key: FMP_API_KEY
        sync: false

databases:
  - name: track-holdings-db
    plan: free
    databaseName: track_holdings
    region: oregon
